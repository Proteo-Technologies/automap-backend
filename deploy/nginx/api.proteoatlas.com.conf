# Nginx del host (Ubuntu) para api.proteoatlas.com
#
# Ubicación sugerida en el servidor:
#   /etc/nginx/sites-available/api.proteoatlas.com
#   /etc/nginx/sites-enabled/api.proteoatlas.com  (symlink)
#
# Pasos:
#   sudo cp deploy/nginx/api.proteoatlas.com.conf /etc/nginx/sites-available/api.proteoatlas.com
#   sudo ln -sf /etc/nginx/sites-available/api.proteoatlas.com /etc/nginx/sites-enabled/api.proteoatlas.com
#   sudo rm -f /etc/nginx/sites-enabled/default      # opcional: quita el welcome page
#   sudo nginx -t && sudo systemctl reload nginx
#
# Certbot ya emitió el certificado. Si no, ejecuta:
#   sudo certbot --nginx -d api.proteoatlas.com

# Redirige HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.proteoatlas.com;

    # Permite renovaciones de Let's Encrypt por HTTP-01
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: proxy inverso al contenedor nginx de Docker (que a su vez balancea al backend)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.proteoatlas.com;

    # Certificados emitidos por certbot
    ssl_certificate     /etc/letsencrypt/live/api.proteoatlas.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.proteoatlas.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Tamaño razonable para subir mapas/GeoJSON
    client_max_body_size 25m;

    # Logs dedicados (opcional)
    access_log /var/log/nginx/api.proteoatlas.com.access.log;
    error_log  /var/log/nginx/api.proteoatlas.com.error.log warn;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # Contenedor nginx expuesto en 127.0.0.1:8000 por docker-compose
        proxy_pass http://127.0.0.1:8000;
    }
}
