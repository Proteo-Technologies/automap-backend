# Uso:
#   docker compose up -d --build
# Balanceo horizontal (varias réplicas del API detrás de nginx):
#   docker compose up -d --build --scale backend=4
#
# Puerto público (nginx): por defecto 8000; cambia con PUBLIC_PORT en el entorno.

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      # En producción bindeamos a 127.0.0.1 para que solo el nginx del host (HTTPS)
      # pueda acceder. Sobrescribe PUBLIC_BIND=0.0.0.0 si necesitas exponer en LAN.
      - "${PUBLIC_BIND:-127.0.0.1}:${PUBLIC_PORT:-8000}:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - automap
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "8000"
    environment:
      DATA_DIR: ${DATA_DIR:-./DB}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3001}
      # Si DATABASE_URL está vacío, el entrypoint arma la URL con POSTGRES_* (mismo compose).
      DATABASE_URL: ${DATABASE_URL:-}
      POSTGRES_USER: ${POSTGRES_USER:-automap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-automap}
      JWT_SECRET: ${JWT_SECRET:-cambiar-en-produccion-usa-secreto-largo-aleatorio}
      ENV: ${ENV:-development}
      TRUSTED_PROXY: ${TRUSTED_PROXY:-false}
      EXPOSE_API_DOCS: ${EXPOSE_API_DOCS:-true}
      HSTS_SECONDS: ${HSTS_SECONDS:-0}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_JWT_ISSUER: ${SUPABASE_JWT_ISSUER:-}
      SUPABASE_JWT_AUDIENCE: ${SUPABASE_JWT_AUDIENCE:-authenticated}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
    volumes:
      - ./DB:/app/DB:ro
    networks:
      - automap
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')",
        ]
      interval: 15s
      timeout: 8s
      retries: 5
      start_period: 45s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-automap}
      # En producción define POSTGRES_PASSWORD en .env (no uses el valor por defecto).
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-automap}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - automap
    # Solo expuesto internamente; no publica puerto al host por seguridad.
    # Descomenta para acceso local con psql/DBeaver (solo dev):
    # ports:
    #   - "127.0.0.1:5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-automap} -d ${POSTGRES_DB:-automap}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

networks:
  automap:
    driver: bridge

volumes:
  pgdata:
    driver: local
